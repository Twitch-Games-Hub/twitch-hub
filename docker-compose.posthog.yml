# PostHog self-hosted stack for local development
# Runs at http://localhost:8000
# Manage via: ./scripts/dev-init.sh posthog [up|down|nuke]

services:
  posthog-db:
    image: postgres:16-alpine
    container_name: posthog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: posthog
      POSTGRES_DB: posthog
    volumes:
      - posthog-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U posthog']
      interval: 5s
      timeout: 5s
      retries: 10

  posthog-redis:
    image: redis:7-alpine
    container_name: posthog-redis
    restart: unless-stopped
    volumes:
      - posthog-redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  posthog-clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: posthog-clickhouse
    restart: unless-stopped
    volumes:
      - posthog-clickhouse:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  posthog-zookeeper:
    image: zookeeper:3.7
    container_name: posthog-zookeeper
    restart: unless-stopped
    volumes:
      - posthog-zookeeper-data:/data
      - posthog-zookeeper-log:/datalog

  posthog-kafka:
    image: bitnami/kafka:3.6
    container_name: posthog-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: posthog-zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      ALLOW_PLAINTEXT_LISTENER: 'yes'
    depends_on:
      - posthog-zookeeper
    volumes:
      - posthog-kafka:/bitnami/kafka

  posthog-objectstorage:
    image: minio/minio
    container_name: posthog-objectstorage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: object_storage_root_user
      MINIO_ROOT_PASSWORD: object_storage_root_password
    volumes:
      - posthog-minio:/data

  posthog-web:
    image: posthog/posthog:release-1.43.0
    container_name: posthog-web
    restart: unless-stopped
    depends_on:
      posthog-db:
        condition: service_healthy
      posthog-redis:
        condition: service_healthy
      posthog-clickhouse:
        condition: service_started
      posthog-kafka:
        condition: service_started
      posthog-objectstorage:
        condition: service_started
    ports:
      - '8000:8000'
    env_file:
      - .posthog.env
    environment:
      DATABASE_URL: postgres://posthog:posthog@posthog-db:5432/posthog
      REDIS_URL: redis://posthog-redis:6379/
      CLICKHOUSE_HOST: posthog-clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_SECURE: 'false'
      CLICKHOUSE_VERIFY: 'false'
      KAFKA_HOSTS: posthog-kafka:9092
      SITE_URL: http://localhost:8000
      OBJECT_STORAGE_ENDPOINT: http://posthog-objectstorage:9000
      OBJECT_STORAGE_ACCESS_KEY_ID: object_storage_root_user
      OBJECT_STORAGE_SECRET_ACCESS_KEY: object_storage_root_password
      OBJECT_STORAGE_ENABLED: 'true'
      IS_BEHIND_PROXY: 'false'

  posthog-worker:
    image: posthog/posthog:release-1.43.0
    container_name: posthog-worker
    restart: unless-stopped
    command: ./bin/docker-worker-celery --with-scheduler
    depends_on:
      posthog-db:
        condition: service_healthy
      posthog-redis:
        condition: service_healthy
      posthog-clickhouse:
        condition: service_started
      posthog-kafka:
        condition: service_started
      posthog-objectstorage:
        condition: service_started
    env_file:
      - .posthog.env
    environment:
      DATABASE_URL: postgres://posthog:posthog@posthog-db:5432/posthog
      REDIS_URL: redis://posthog-redis:6379/
      CLICKHOUSE_HOST: posthog-clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_SECURE: 'false'
      CLICKHOUSE_VERIFY: 'false'
      KAFKA_HOSTS: posthog-kafka:9092
      SITE_URL: http://localhost:8000
      OBJECT_STORAGE_ENDPOINT: http://posthog-objectstorage:9000
      OBJECT_STORAGE_ACCESS_KEY_ID: object_storage_root_user
      OBJECT_STORAGE_SECRET_ACCESS_KEY: object_storage_root_password
      OBJECT_STORAGE_ENABLED: 'true'

  posthog-plugins:
    image: posthog/posthog:release-1.43.0
    container_name: posthog-plugins
    restart: unless-stopped
    command: ./bin/plugin-server --no-restart-loop
    depends_on:
      posthog-db:
        condition: service_healthy
      posthog-redis:
        condition: service_healthy
      posthog-clickhouse:
        condition: service_started
      posthog-kafka:
        condition: service_started
      posthog-objectstorage:
        condition: service_started
    env_file:
      - .posthog.env
    environment:
      DATABASE_URL: postgres://posthog:posthog@posthog-db:5432/posthog
      REDIS_URL: redis://posthog-redis:6379/
      CLICKHOUSE_HOST: posthog-clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_SECURE: 'false'
      CLICKHOUSE_VERIFY: 'false'
      KAFKA_HOSTS: posthog-kafka:9092
      SITE_URL: http://localhost:8000
      OBJECT_STORAGE_ENDPOINT: http://posthog-objectstorage:9000
      OBJECT_STORAGE_ACCESS_KEY_ID: object_storage_root_user
      OBJECT_STORAGE_SECRET_ACCESS_KEY: object_storage_root_password
      OBJECT_STORAGE_ENABLED: 'true'

volumes:
  posthog-pgdata:
  posthog-redisdata:
  posthog-clickhouse:
  posthog-zookeeper-data:
  posthog-zookeeper-log:
  posthog-kafka:
  posthog-minio:
