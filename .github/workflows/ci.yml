name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [lint, typecheck, build, test]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: twitch_hub
          POSTGRES_PASSWORD: twitch_hub
          POSTGRES_DB: twitch_hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U twitch_hub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter @twitch-hub/server db:generate
      - run: bun run ${{ matrix.check == 'lint' && 'lint && bun run format:check' || matrix.check }}
        env:
          DATABASE_URL: postgresql://twitch_hub:twitch_hub@localhost:5432/twitch_hub
          REDIS_URL: redis://localhost:6379

  publish:
    name: Publish ${{ matrix.app }} Image
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [server, web]
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/twitch-hub-${{ matrix.app }}:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/twitch-hub-${{ matrix.app }}:${{ github.sha }}
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deploy webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          curl -sf -X POST \
            -u "deploy:${WEBHOOK_SECRET}" \
            -H "X-Hook-Mode: buffered" \
            --max-time 600 \
            "${WEBHOOK_URL}"

  report-failure:
    name: Report Failure
    runs-on: ubuntu-latest
    needs: [quality, publish, deploy]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(needs.*.result, 'failure')
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Create issue on CI failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "CI failed on main (${{ github.sha }})" \
            --label "bug" \
            --body "## CI pipeline failed on \`main\`
          **Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          **Author:** ${{ github.actor }}
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
