name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [lint, typecheck, build, test]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: twitch_hub
          POSTGRES_PASSWORD: twitch_hub
          POSTGRES_DB: twitch_hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U twitch_hub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @twitch-hub/shared-types run build
      - run: pnpm --filter @twitch-hub/server run db:generate
      - run: pnpm run ${{ matrix.check == 'lint' && 'lint && pnpm run format:check' || matrix.check }}
        env:
          DATABASE_URL: postgresql://twitch_hub:twitch_hub@localhost:5432/twitch_hub
          REDIS_URL: redis://localhost:6379

  container-smoke:
    name: Container Smoke (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [quality]
    strategy:
      matrix:
        include:
          - app: server
            port: 3001
            health: /healthz
          - app: web
            port: 3000
            health: /
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          load: true
          tags: twitch-hub-${{ matrix.app }}:smoke
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max

      - name: Start dependencies
        if: matrix.app == 'server'
        run: |
          docker network create smoke
          docker run -d --name postgres --network smoke \
            -e POSTGRES_USER=twitch_hub \
            -e POSTGRES_PASSWORD=twitch_hub \
            -e POSTGRES_DB=twitch_hub \
            postgres:17-alpine
          docker run -d --name redis --network smoke \
            redis:7-alpine
          for i in $(seq 1 30); do
            docker exec postgres pg_isready -U twitch_hub && break
            sleep 1
          done
          for i in $(seq 1 15); do
            docker exec redis redis-cli ping | grep -q PONG && break
            sleep 1
          done

      - name: Start container
        run: |
          if [ "${{ matrix.app }}" = "server" ]; then
            docker run -d --name app --network smoke \
              -p ${{ matrix.port }}:${{ matrix.port }} \
              -e DATABASE_URL=postgresql://twitch_hub:twitch_hub@postgres:5432/twitch_hub \
              -e REDIS_URL=redis://redis:6379 \
              -e JWT_SECRET=smoke-test-secret \
              -e INTERNAL_API_SECRET=smoke-test-internal \
              -e TWITCH_CLIENT_ID=smoke-test-id \
              -e TWITCH_CLIENT_SECRET=smoke-test-secret \
              twitch-hub-${{ matrix.app }}:smoke
          else
            docker run -d --name app \
              -p ${{ matrix.port }}:${{ matrix.port }} \
              twitch-hub-${{ matrix.app }}:smoke
          fi

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:${{ matrix.port }}${{ matrix.health }} > /dev/null; then
              echo "Container is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to become healthy within 60s"
          docker logs app
          exit 1

      - name: Print container logs
        if: failure()
        run: docker logs app

  publish:
    name: Publish ${{ matrix.app }} Image
    runs-on: ubuntu-latest
    needs: [quality, container-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [server, web]
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/twitch-hub-${{ matrix.app }}:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/twitch-hub-${{ matrix.app }}:${{ github.sha }}
          secrets: |
            ${{ secrets.SENTRY_AUTH_TOKEN && format('SENTRY_AUTH_TOKEN={0}', secrets.SENTRY_AUTH_TOKEN) || '' }}
            ${{ secrets.SENTRY_ORG && format('SENTRY_ORG={0}', secrets.SENTRY_ORG) || '' }}
            ${{ secrets.SENTRY_PROJECT && format('SENTRY_PROJECT={0}', secrets.SENTRY_PROJECT) || '' }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions: {}
    steps:
      - name: Trigger deploy webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "WEBHOOK_URL not configured, skipping deploy"
            exit 0
          fi
          curl -sf -X POST \
            -u "deploy:${WEBHOOK_SECRET}" \
            -H "X-Hook-Mode: buffered" \
            --max-time 600 \
            "${WEBHOOK_URL}"

  report-failure:
    name: Report Failure
    runs-on: ubuntu-latest
    needs: [quality, container-smoke, publish, deploy]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(needs.*.result, 'failure')
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Create issue on CI failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "CI failed on main (${{ github.sha }})" \
            --label "bug" \
            --body "## CI pipeline failed on \`main\`
          **Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          **Author:** ${{ github.actor }}
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
