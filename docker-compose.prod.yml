services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: twitch_hub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-twitch_hub}
      POSTGRES_DB: twitch_hub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U twitch_hub']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://twitch_hub:${POSTGRES_PASSWORD:-twitch_hub}@postgres:5432/twitch_hub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
      TWITCH_REDIRECT_URI: ${TWITCH_REDIRECT_URI}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      SERVER_PORT: '3001'
    ports:
      - '3001:3001'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    environment:
      PUBLIC_SERVER_URL: http://server:3001
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      PORT: '3000'
    ports:
      - '3000:3000'

volumes:
  pgdata:
  redisdata:
