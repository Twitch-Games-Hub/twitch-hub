services:
  postgres:
    image: postgres:17-alpine
    container_name: twitch-hub-postgres
    environment:
      POSTGRES_USER: twitch_hub
      POSTGRES_PASSWORD: twitch_hub
      POSTGRES_DB: twitch_hub
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U twitch_hub']
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: twitch-hub-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
